# params.yaml — Single source of truth for ALL parameters
# Change here → DVC detects → only affected stages re-run

paths:
  calibration_dir:  "data/calibration_assets"
  raw_dir:          "data/raw_bw"
  simulated_dir:    "data/ir_simulated"
  calibrated_dir:   "data/calibrated"
  processed_dir:    "data/processed"
  output_dir:       "data/output"
  ground_truth_dir: "data/ground_truth"
  models_dir:       "models"

simulate:
  num_frames:         200
  frame_skip:         15
  width:              640
  height:             480
  temp_min_k:         290.0
  temp_max_k:         340.0
  gain_sigma:         0.05
  offset_sigma:       2.0
  dark_current_mean:  50
  dark_current_scale: 0.1
  netd_noise_k:       0.015
  drift_per_frame:    0.002
  bad_pixel_ratio:    0.001
  grain_sigma:        1.5

calibrate:
  auto_generate:     true   # auto-estimate if files missing — works on ANY image
  dark_frame_count:  30
  flat_frame_count:  30
  to_kelvin:         false  # set true only when sensor constants known

deterministic:
  bad_pixel_threshold_sigma: 5.0
  kalman_process_noise:      0.001
  kalman_measurement_noise:  0.1
  wavelet:                   "db4"
  wavelet_level:             3
  wavelet_threshold_mode:    "soft"
  background_alpha:          0.05
  wiener_kernel_size:        5

enhance:
  # ── Super-Resolution (optional, needs EDSR_x2.pb in models/) ──────────────
  super_resolution: false
  sr_model_path:    "models/EDSR_x2.pb"
  sr_scale:         2

  # ── Step 2: Anisotropic Diffusion (Perona-Malik) ──────────────────────────
  # Core algorithm for old-film / degraded image grain removal.
  # Increase iterations for more smoothing; lower kappa preserves weaker edges.
  anisotropic_iterations:  20     # diffusion steps  (range: 10–30)
  anisotropic_kappa:       25.0   # edge-stopping threshold (range: 15–50)
  anisotropic_gamma:       0.12   # step size, must stay < 0.25 for stability

  # ── Step 3: Multi-Scale Retinex (MSR) ─────────────────────────────────────
  # Core algorithm for contrast recovery from faded / low-contrast images.
  # Three Gaussian scales: [fine detail, mid-range, global illumination].
  retinex_sigmas:   [10, 60, 180]  # sigma values for MSR
  retinex_blend:    0.65           # MSR weight in blend (0.0=only diffused, 1.0=only retinex)

  # ── Step 4: Adaptive NLM Denoising ────────────────────────────────────────
  # h is computed as: h = clip(noise_sigma * 80, nlm_h_min, nlm_h_max)
  # Was previously fixed at h=15 — too aggressive, destroyed edges.
  nlm_h_min:        4     # minimum denoising strength (clean images)
  nlm_h_max:        12    # maximum denoising strength (very noisy images)

  # ── Step 5: Top-Hat Enhancement ───────────────────────────────────────────
  tophat_kernel_size:  13    # structuring element size (px)
  tophat_strength:     0.25  # blend weight of top-hat residual

  # ── Step 6: CLAHE ─────────────────────────────────────────────────────────
  # Increased from 2.0 to 3.0 — safe now that diffusion cleaned background
  clahe_clip_limit:    3.0   # contrast limit (range: 1.5–5.0)
  clahe_tile_size:     8     # grid divisions (8x8 = local blocks of ~60px at 480p)

  # ── Step 7: Bilateral Filter ───────────────────────────────────────────────
  # Was defined but never called in v2.0 — now active.
  bilateral_d:            7     # filter diameter in pixels
  bilateral_sigma_color:  50.0  # intensity range for averaging
  bilateral_sigma_space:  50.0  # spatial neighbourhood radius

  # ── Step 8: Unsharp Masking ────────────────────────────────────────────────
  # Reduced amount from 1.5→0.8 — prevents halo artifacts after Retinex
  unsharp_radius:     1.5   # Gaussian blur radius for unsharp mask
  unsharp_amount:     0.8   # sharpening strength (range: 0.5–1.5)
  unsharp_threshold:  10    # only sharpen pixels where |edge| > threshold

  # ── Step 9: Gamma ──────────────────────────────────────────────────────────
  gamma: 0.80   # < 1.0 brightens midtones (0.75=FLIR standard, 0.80=good for film)

detection:
  # YOLOv8 — pre-trained on COCO (80 classes). Auto-downloads on first run.
  # Works on ANY image, no fine-tuning required.
  yolo_model_size:   "n"      # n=nano(fastest), s=small, m=medium, l=large
  yolo_conf:         0.25     # lower = more detections (more FP), higher = stricter
  yolo_iou:          0.45     # NMS overlap threshold
  device:            "cpu"    # "cpu" or "cuda:0"

  # Thermal hotspot detection (no model — runs on top of YOLO)
  use_thermal_detector:  true
  hotspot_percentile:    90.0
  fire_percentile:       98.0
  min_area_pixels:       40

  # Tracker
  tracker_max_distance:  60
  tracker_max_disappeared: 15

  # All 80 COCO classes are detected automatically.
  # The list below controls which classes are highlighted in outputs.
  # Leave empty ([]) to show ALL 80 classes.
  highlight_classes:
    - person
    - car
    - truck
    - bus
    - motorcycle
    - bicycle
    - airplane
    - train
    - boat
    - dog
    - cat
    - bird
    - fire hydrant
    - hotspot
    - fire
    - heat_source
    - anomaly

mlflow:
  enabled:          true
  tracking_uri:     "http://localhost:5000"
  experiment_name:  "ir_pipeline_v2"
  run_tags:
    project:      "DRDO_SSPL"
    pipeline_ver: "3.0.0"
    model:        "yolov8n_coco_pretrained"

api:
  host:    "0.0.0.0"
  port:    8000
  workers: 4
  max_upload_mb: 100
